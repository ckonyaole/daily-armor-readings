name: Daily Readings Generation

on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC daily
  workflow_dispatch:
    inputs:
      date:
        description: 'Date in YYYY-MM-DD (default: today UTC)'
        required: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine date
        id: date
        run: |
          DATE="${{ inputs.date }}"
          if [ -z "$DATE" ]; then DATE=$(date -u +%Y-%m-%d); fi
          echo "value=$DATE" >> "$GITHUB_OUTPUT"
          echo "Generating reading for $DATE"

      - name: Generate exegesis
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python -m scripts.generate --date "${{ steps.date.outputs.value }}"

      - name: Commit + push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --cached --quiet; then
            echo "No new output to commit"
          else
            git commit -m "daily: ${{ steps.date.outputs.value }}"
            git push
          fi
