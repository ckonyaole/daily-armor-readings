name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit + integration tests
        run: pytest tests/ -v

      - name: Validate all committed output JSONs
        run: |
          python -c "
          import json
          import sys
          from pathlib import Path
          from scripts.validate_output import validate

          fail = 0
          for p in sorted(Path('output').glob('*.json')):
              data = json.loads(p.read_text(encoding='utf-8'))
              if 'status' in data:
                  print(f'{p.name}: skip (placeholder: {data[\"status\"]})')
                  continue
              try:
                  validate(data, ccc_path='corpus/embeddings/ccc.parquet')
                  print(f'{p.name}: OK')
              except Exception as e:
                  print(f'{p.name}: FAIL — {e}')
                  fail += 1
          sys.exit(fail)
          "
